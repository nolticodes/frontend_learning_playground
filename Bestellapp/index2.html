<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .header_style {
            height: 120px;
            width: 100%;
            background-color: orange;
        }

        .content_wrapper_2 {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .content_wrapper_max_width {
            width: 100%;
            max-width: 1440px;
        }

        .content_left_2 {
            width: calc(100% - 300px);
            height: 50%;
            background-color: green;
        }

        .content_right_2 {
            width: 300px;
            height: 100%;
            display: flex;
            justify-content: center;
            position: absolute;
            top: 0;
            right: 0;
            z-index: 0;
        }

        .basket_2 {
            width: 280px;
            height: 600px;
            background-color: red;
        }

        .basket {
            width: 280px;
            height: 600px;
            background-color: red;
            top: 0;
            position: sticky;
            z-index: 2;
        }

        .barrier_full_width {
            display: flex;
            justify-content: center;
            width: 100%;
            height: 60px;
            background-color: pink;
            z-index: 1;
        }

        .barrier_max_width {
            height: 100%;
            width: 100%;
            max-width: 1440px;
            background-color: blue;
        }

        .full_content_full_width {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .full_content_max_width {
            width: 100%;
            max-width: 1440px;
            position: relative;
        }
    </style>
</head>

<body>
    <header class="header_style">

    </header>

    <section class=content_wrapper_2>
        <div class="barrier_full_width">
            <div class="barrier_max_width">
                Burger
            </div>
        </div>

        <div class="full_content_full_width">
            <div class="full_content_max_width">
                <div class="content_left_2">
                    <div class="basket_2">

                    </div>
                    <div class="basket_2"></div>

                </div>



                <div class="barrier_full_width">
                    <div class="barrier_max_width">
                        Pizza
                    </div>
                </div>
                <div class="content_wrapper_max_width">

                    <div class="content_left_2">
                        <div class="basket_2">
                        </div>
                        <div class="basket_2">
                        </div>
                    </div>

                    <div class="content_right_2">
                        <div class="basket">

                        </div>

                    </div>
                </div>
            </div>
        </div>


    </section>

</body>

</html>
