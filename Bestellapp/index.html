<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestellapp</title>

    <!-- SCRIPTS -->
    <script defer src="./js/dishes_data.js"></script>
    <script defer src="./js/html_templates.js"></script>
    <script defer src="./js/scripts.js"></script>

    <!-- STYLE -->
    <link rel="stylesheet" href="./css/website_style.css">
    <link rel="stylesheet" href="./css/content_sizing.css">
    <link rel="stylesheet" href="./css/basket_style.css">
    <link rel="stylesheet" href="./css/dish_list.css">

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="#">

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
        rel="stylesheet">

</head>

<body onload="init()">

    <header>
        <section class="header_content">
            <img src="./assets/img/Logo 02.svg">

            <div class="burger_menu_placeholder">
                <div class="lines_burger_menu"></div>
                <div class="lines_burger_menu"></div>
                <div class="lines_burger_menu"></div>
            </div>
        </section>
    </header>

    <main>
        <section class="main_header">
            <div>
                <img src="./assets/img/hero.png"  style="height: 508px; object-fit: cover;">
            </div>
            <div class="round_img_area">
                <img class="round_img" src="./assets/img/crab_logo.png">
            </div>

            <div class="headline_text">
                <h1><span style="color: orange;">Krosse</span> Krabbe</h1>
                <p>The best Burgers & Pizza in Bikini Bottom </p>
                <div class="headline_text_rating">
                    <img src="./assets/icons/star.svg">
                    <h2>4,8</h2>
                    <p>(1.111)</p>
                </div>
            </div>
        </section>

        <section class="full_dish_content" id="full_dish_content_id">
            <section class="dish_category_full_width">
                <div class="dish_category_max_width">
                    <img src="#">
                    <h2>KRABBEN BURGER</h2>
                </div>
            </section>


            <section class="dish_content_full_width">
                <div class="dish_content_max_width">
                    <div class="dishes_category_list">
                        <div class="dish_card">
                            <img src="./assets/dish_img/Rectangle 10.png">
                            <div class="dish_card_stats">
                                <div class="dish_card_header">
                                    <h3>Krabben Burger 1</h3>
                                    <h3>16,90€</h3>
                                </div>
                                <div class="dish_card_middle">
                                    <p>Mit ganz viel Liebe</p>
                                </div>
                                <div class="dish_card_bottom">
                                    <p>BUTTON</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </section>



        <section class="shopping_cart">

            <h3>Your Basket</h3>
            <div class="basket_dish_list">
                <h4><span>1 x </span>Krosse Krabbe Pizza</h4>
            </div>
            <div class="basket_dish_list">
                <h4><span>1 x </span>Krosse Krabbe Pizza</h4>
            </div>

        </section>

    </main>

    <footer>
        <section class="footer_content">

        </section>
    </footer>

</body>

</html>
