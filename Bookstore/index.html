<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookstore</title>

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="./assets/img/book_icon.png">


    <!-- STYLE -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/inofbox_style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
        rel="stylesheet">

    <!-- SCRIPTS -->
    <script defer src="./js/html_tempalte.js"></script>
    <script defer src="./js/datenbank.js"></script>
    <script defer src="./js/script.js"></script>

</head>

<body onload="init()">


    <header>
        <section class="header_content">
            <h1>BOOKSTOREEE</h1>

        </section>
    </header>

    <main>
        <section id="section_book_infobox_id" class="main_content">

            <div class="book_infobox">
                <div id="book_infobox_title_id" class="book_infobox_header">
                    <h2>BOOKTITLE</h2>
                </div>

                <div class="border_line">
                </div>

                <div class="book_infobox_main">
                    <div class="book_infobox_main_img">
                        <img src="./assets/img/book_icon.png">
                    </div>

                    <div class="border_line">
                    </div>

                    <div class="book_infobox_main_header">
                        <h3>PREIS</h3>
                        <div class="book_infobox_main_header_likes">
                            <h4>1250</h4>
                            HERZ
                        </div>
                    </div>

                    <table class="book_infobox_main_stats">
                        <tr>
                            <td class="table_title">AUTHOR:</td>
                            <td class="table_value" id="book_infobox_author_id">MIAU</td>
                        </tr>
                        <tr>
                            <td class="table_title">ERSCHEINUNGSJAHR:</td>
                            <td class="table_value" id="book_infobox_year_id">MIAU</td>
                        </tr>
                        <tr>
                            <td class="table_title">GENRE:</td>
                            <td class="table_value" id="book_infobox_genre_id">MIAU</td>
                        </tr>
                    </table>

                    <div class="border_line">
                    </div>
                    

                    <div class="book_infobox_main_comments_section">
                    <h2 class="book_infobox_main_comments">Kommentare:</h2>
                    </div>


                </div>


                <div class="book_infobox_footer">

                </div>

            </div>

        </section>
    </main>

    <footer>
        <section class="footer_content">

        </section>
    </footer>

</body>

</html>
