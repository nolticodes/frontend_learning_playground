<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>

    <!-- SCRIPTS -->
    <script defer src="./js/db.js"></script>
    <script defer src="./js/html_templates.js"></script>
    <script defer src="./js/script.js"></script>

    <!-- STYLE -->
    <link rel="stylesheet" href="./css/content_sizing.css">
    <link rel="stylesheet" href="./css/website_style.css">
    <link rel="stylesheet" href="./css/main_pokecard_style.css">
    <link rel="stylesheet" href="./css/detail_pokecard_style.css">

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="./assets/img/crab_logo.png">

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
        rel="stylesheet">

</head>

<body onload="init()">

    <header>
        <section class="header_content">
            <div class="header_content_title_section">
                <img src="./assets/img/img/pokeball_icon_2.png">
                <h1>Pokedex</h1>
            </div>
            <div class="header_content_search_section">
                <input type="text" id="search_input_id" placeholder="Pokemon Name">
                <img src="./assets/img/img/search_iconpng.png" onclick="searchPokemon()">
            </div>

        </section>
    </header>

    <main>
        <section class="main_content">

            <div class="main_content_filter_section">
                <h2>All</h2>
                <h2>Gen 1</h2>
                <h2>Gen 2</h2>
                <h2>Gen 3</h2>
                <h2>Gen 4</h2>
            </div>

            <div class="main_content_all_pokecards" id="all_pokecards_id">
                <div class="main_content_pokecard">
                    <div class="main_content_pokecard_header">
                        <h3>#<span id="pokemon_id_id">1</span></h3>
                        <h3 id="pokemon_name_id">Bulbasaur</h3>
                    </div>

                    <div class="main_content_pokecard_main">
                        <img
                            src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/dream-world/6.svg">
                    </div>

                    <div class="main_content_pokecard_footer">

                    </div>

                </div>
            </div>

            <div class="main_content_button_section">
                <button onclick="loadMorePokemons()">Load more Pokemon</button>
            </div>

        </section>

    </main>

    <footer>
        <section class="footer_content">

        </section>

    </footer>


</body>

</html>
