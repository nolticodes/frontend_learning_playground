<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- SCRIPTS -->
    <script defer src="./js/db.js"></script>
    <script defer src="./js/html_templates.js"></script>
    <script defer src="./js/script.js"></script>

    <!-- STYLE -->
    <link rel="stylesheet" href="./css/content_sizing.css">
    <link rel="stylesheet" href="./css/website_style.css">
    <link rel="stylesheet" href="./css/main_pokecard_style.css">
    <link rel="stylesheet" href="./css/detail_pokecard_style.css">
    <link rel="stylesheet" href="./css/background_type.css">

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="./assets/img/img/pokeball_icon_2.png">

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
        rel="stylesheet">


    <style>
        .pokemon_detail_card_dialog_style2 {
            width: 800px;
            height: 700px;
            border: none;
            border-radius: 24px;
            background-color: red;
            top: calc((100% - 700px)/2);
            left: calc((100% - 800px)/2);
            display: flex;
            padding: 0;
            overflow: hidden;
        }

        .dialog_pokedex_left {
            width: 47.5%;
            height: 100%;
            background-color: blue;
            padding: 16px;
        }

        .dialog_pokedex_middle_fold {
            width: 5%;
            height: 100%;
            background-color: black;
        }

        .dialog_pokedex_right {
            width: 47.5%;
            height: 100%;
            background-color: green;
            padding: 16px;
        }

        .dialog_pokedex_left_header {
            height: 15%;
            background-color: orange;
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        .big_circle_light {
            width: 80px;
            height: 80px;
            background-color: #03AEEF;
            border-radius: 50%;
        }

        .small_circle_light {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        .position_small_circle_lights {
            padding-left: 16px;
            height: 80px;
            display: flex;
            justify-content: center;
            gap: 16px;
        }
        .red {
            background-color: red;
        }

        .yellow {
            background-color: yellow;
        }

        .green {
            background-color: green;
        }
    </style>
</head>

<body>

    <dialog class="pokemon_detail_card_dialog_style2" id="pokemon_detail_card_dialog_id" open>
        <div class="dialog_pokedex_left">
            <div class="dialog_pokedex_left_header">
                <div class="big_circle_light">
                </div>
                <div class="position_small_circle_lights">
                    <div class="small_circle_light red">
                    </div>
                    <div class="small_circle_light yellow">
                    </div>
                    <div class="small_circle_light green">
                    </div>
                </div>
            </div>
            <div class="dialog_pokedex_left_screen">

            </div>
            <div class="" dialog_pokedex_left_footer_buttons>

            </div>
        </div>
        <div class="dialog_pokedex_middle_fold">

        </div>

        <div class="dialog_pokedex_right">

        </div>

    </dialog>

</body>

</html>
