<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizApp</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
        rel="stylesheet">


    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/style_pickquiz.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script defer src="./js/script_questions.js"></script>    
    <script defer src="./js/script.js"></script>
    <script defer src="./js/script_pick_quiz.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</head>

<body onload="init()">

    <header>
        <!-- PROGRESSBAR -->
        <div id="progress_bar_id" class="progress progress_bar" role="progressbar" aria-label="Example with label"
            aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">
            <div class="progress-bar" style="width: 25%"></div>
        </div>

    </header>

    <main>


        <div class="card quiz_card">

            <!-- QUIZ START SCREEN -->
            <section class="select_quiz_style">

                <div id="select_quiz_id" class="select_quiz_navbar_style">
                    <img src="./assets/img/icons/logo.png">
                    <div class="select_quiz_navbar_text_style">
                        <h3 id="quiz_navbar_text_1" onclick="activateStartButton('quiz_navbar_text_1')">Quiz 1</h3>
                        <h3 id="quiz_navbar_text_2" onclick="activateStartButton('quiz_navbar_text_2')">Quiz 2</h3>
                        <h3 id="quiz_navbar_text_3" onclick="activateStartButton('quiz_navbar_text_3')">Quiz 3</h3>
                        <h3 id="quiz_navbar_text_4" onclick="activateStartButton('quiz_navbar_text_4')">Quiz 4</h3>
                    </div>
                </div>

                <div class="select_quiz_content">
                    <h2>Wähle ein Quiz!</h2>

                    <button onclick="loadAndStartQuiz()" id="button_start_quiz_id" disabled type="button" class="btn btn-secondary btn-lg">Start Quiz</button>
                </div>

            </section>


            <!-- QUIZ END SCREEN -->
            <div class="card-body" id="end_quiz_body" style="display: none;">
                <div>Du hast das Quiz geschafft!</div>

                <div>Dein Score: <b id="amount_correct_answer"></b> <b>/</b> <b id="questions_counter_all_score"></b>
                </div>

                <button id="start_new_game_id" type="button" class="btn btn-dark" onclick="startNewGame()">New
                    Game</button>

            </div>

            <!-- QUESTIONS -->
            <div class="card-body" id="quiz_body" style="display: none;">

                <h5 class="card-title" id="questionText">Frage</h5>

                <div class="card mb-2 card_answer_style" onclick="clickAnswer('answer_1')">
                    <div class="card-body" id="answer_1">
                        Antwort
                    </div>
                </div>

                <div class="card mb-2 card_answer_style" onclick="clickAnswer('answer_2')">
                    <div class="card-body" id="answer_2">
                        Antwort
                    </div>
                </div>

                <div class="card mb-2 card_answer_style" onclick="clickAnswer('answer_3')">
                    <div class="card-body" id="answer_3">
                        Antwort
                    </div>
                </div>

                <div class="card mb-2 card_answer_style" onclick="clickAnswer('answer_4')">
                    <div class="card-body" id="answer_4">
                        Antwort
                    </div>
                </div>

                <div class="question_footer">
                    <div>
                        Frage <b id="questions_counter_current">1</b> von <b id="questions_counter_all">5</b>
                    </div>
                    <button disabled id="next_button_id" type="button" class="btn btn-dark"
                        onclick="clickNextQuestionBtn()">Nächste Frage</button>
                </div>

            </div>
        </div>

    </main>

</body>

</html>
