<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizApp</title>

    <link rel="stylesheet" href="./style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="./script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</head>

<body onload="init()">

    <header>

    </header>

    <main>

        <div class="card quiz_card">
            <img src="./assets/img/ye.png" class="card-img-top" alt="Bild">

            <div id="progress_bar_id" class="progress progress_bar" role="progressbar" aria-label="Example with label" aria-valuenow="25"
                aria-valuemin="0" aria-valuemax="100">
                <div class="progress-bar" style="width: 25%">25%</div>
            </div>

            <div class="card-body" id="end_quiz_body" style="display: none;">
                <div>Du hast das Quiz geschafft!</div>

                <div>Dein Score: <b id="amount_correct_answer"></b> <b>/</b> <b id="questions_counter_all_score"></b>
                </div>

                <button id="start_new_game_id" type="button" class="btn btn-dark"
                        onclick="startNewGame()">New Game</button>

            </div>

            <div class="card-body" id="quiz_body">

                <h5 class="card-title" id="questionText">Frage</h5>

                <div class="card mb-2 card_answer_style" onclick="clickAnswer('answer_1')">
                    <div class="card-body" id="answer_1">
                        Antwort
                    </div>
                </div>

                <div class="card mb-2 card_answer_style" onclick="clickAnswer('answer_2')">
                    <div class="card-body" id="answer_2">
                        Antwort
                    </div>
                </div>

                <div class="card mb-2 card_answer_style" onclick="clickAnswer('answer_3')">
                    <div class="card-body" id="answer_3">
                        Antwort
                    </div>
                </div>

                <div class="card mb-2 card_answer_style" onclick="clickAnswer('answer_4')">
                    <div class="card-body" id="answer_4">
                        Antwort
                    </div>
                </div>

                <div class="question_footer">
                    <div>
                        Frage <b id="questions_counter_current">1</b> von <b id="questions_counter_all">5</b>
                    </div>
                    <button disabled id="next_button_id" type="button" class="btn btn-dark"
                        onclick="clickNextQuestionBtn()">Nächste Frage</button>
                </div>

            </div>
        </div>

    </main>

</body>

</html>
